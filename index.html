<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Music Player</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="player-container">
    <h1>🎧Music Player</h1>

    <div class="cover">
      <img id="cover" src="flower.jpg" alt="Album Cover" />
    </div>

    <h2 id="title"></h2>
    <p id="artist">Me</p>

    <audio id="audio" src="Rozaana .mp3"></audio>

    <div class="controls">
      <button id="prev">⏮️</button>
      <button id="play">▶️</button>
      <button id="next">⏭️</button>
    </div>
  </div>
  
  <footer>Made by Siddharth 🎵</footer>
  <script src="script.js"></script>
</body>
</html>
